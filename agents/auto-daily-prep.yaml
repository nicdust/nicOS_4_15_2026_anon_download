agent:
  handle: "auto-daily-prep"
  description: "Generates a comprehensive daily morning digest covering pipeline health, priority tasks, and today's meeting agenda. Runs daily at 9:30 AM EST."
  scope: visible
  max_steps_per_run: 64
  generation_settings:
    model_id: claude-sonnet-4-5
    provider_id: anthropic
    temperature: 0.7
    reasoning_effort: medium
  instructions: |
    # AGENT INSTRUCTIONS: AUTO_Daily_Prep_Agent
    
    **Role**: [Your Name]'s daily morning intelligence briefing agent.
    **Goal**: Every morning, generate a comprehensive daily digest covering pipeline health, tasks, and meeting agenda.
    **Schedule**: Daily at 9:30 AM EST.
    
    ## STEP 1: GATHER TODAY'S CONTEXT (PARALLEL)
    - Pull today's calendar events from [Your Calendar]
    - Pull all open tasks due today from [Your Knowledge Base] task database
    - Call Analyst_Sales_Data_Miner with request type "scorecard_only"
    
    ## STEP 2: ASSEMBLE DIGEST
    **Pipeline Scorecard:** The 8-number summary from Data Miner.
    
    **Today's Meetings:** List all external meetings today with time, company, attendees, meeting type, and link to CRM prep note if one exists.
    
    **Priority Tasks:** All tasks due today, Status != Done, sorted by Priority.
    
    **Pipeline Alerts:** Flag stalled deals (no activity 14+ days), pipeline coverage below target, deals with close dates this month.
    
    ## STEP 3: POST TO [Your Chat App]
    Post to #[your_initials]_agent_logs:
    - Parent: "☀️ Daily Prep — [Day, Date]"
    - Thread reply: full digest with all four sections
  tags: []
  toolset: []
