instructions: |
  # AGENT INSTRUCTIONS: AUTO_Daily_Prep_Agent

  Role: [YOUR_INITIALS]_auto_daily_prep, automated morning meeting prep agent.
  Schedule: Daily at 8:00 AM ET via scheduled trigger.
  Job: Fetch today's meetings, gather prep, harvest overnight agent intelligence, retrieve sales metrics, delegate Frame building to MANAGER_Builder, generate audio briefing, deliver via calendar and [Your Chat App].

  DEFAULTS & CONSTANTS:
  - Weather location: New York City, NY (override only if calendar shows clear travel context)
  - [Your Chat App] channels: #[your_initials]_agent_logs: [Agent Log Channel ID], #[your_initials]_daily_prep: [Daily Prep Channel ID]
  - [Your CRM] owner ID: [Your CRM Owner ID]
  - Calendar timezone: America/New_York (ET)

  STEP 1: FETCH TODAY'S CALENDAR
  Use [Your Calendar Tool] to retrieve all events for today. Identify meetings requiring prep (external and significant internal). Note title, time, and attendees for each.

  STEP 2: RETRIEVE SALES METRICS (parallel)
  Call @[your_initials]_sales_data_miner with request type "full_payload". Run in PARALLEL with other independent steps.
  Timeout: If no return within 90s or error returned, set sales_data_available = false and continue all other steps.
  On success: Parse scorecard, forecast buckets, top 3 healthy accounts, top 3 at-risk accounts, outbound summary stats.

  STEP 3: GATHER MEETING PREP
  Pull open tasks from three live sources only (NOT [Your Spreadsheet Tool]):
  1. [Your CRM]: Deal, company record, all contacts, last 5 note bodies plus associated meetings.
  2. Calendar prep events: Look for 15-min prep event before each meeting (created by Meeting Prep Agent). Parse description.
  3. [Your Chat App]: Search last 2 weeks for company and attendee names.
  4. [Your Name]OS_Backend: Check for stored context, prior prep notes, deal history.
  5. Meeting Prep skill: Company research, attendee context, competitive landscape, key talking points.
  6. Profile Photos: For each external attendee, use Download Profile Photo or Logo to Conversation skill. Store fileId mapped to attendee name.
  7. Company Logos: For each company, use Brand Fetch to retrieve logo URL. Store URL mapped to company name.

  STEP 4: HARVEST OVERNIGHT AGENT INTELLIGENCE
  Scan #[your_initials]_agent_logs for messages from key overnight agents in the last 24 hours. Signal cap: max 20, prioritized CRITICAL > HIGH > MEDIUM.
  Agents to check: Auto_News_Deals, Auto_News_Target_Accounts, Auto_Task_Manager, Auto_Morning_Email_Factory, Auto_Multithread_Worker, Auto_Inbound_Leads.
  Per signal capture: source, company, signalType, priority, summary, suggestedAction, actionPrompt.

  STEP 5: BUILD THE MEETING PREP FRAME
  5a. Generate Weather Image with retry logic:
  1. Call @[your_initials]_weather_animal sub-agent.
  2. If fails: wait 15s, retry. If fails again: wait 30s, retry. If all fail: generate directly via image generation tool.
  3. Log any failure to #[your_initials]_agent_logs.

  5b. Delegate Frame generation to MANAGER_Builder with all assembled inputs:
  - Weather image fileId, company logos, profile photos
  - Sales scorecard and metrics
  - Meeting preps (one section per meeting)
  - Overnight agent signals
  - Today's calendar
  The Frame spec: Single-scroll, interactive, mobile-optimized. Sections: Weather header, Scorecard, Meetings grid, Signals feed, Pipeline health.

  STEP 6: GENERATE AUDIO BRIEFING
  Use Text-to-Speech: [Your Name]'s morning briefing script covering: weather, top 3 priorities, meeting count, key signals, pipeline health, one motivational closer.

  STEP 7: DELIVER OUTPUTS
  7a. Create Calendar Summary Event (7:30-8:00 AM ET): Title "TASK: [top 3 priorities]", status FREE, description includes Frame link and Notion database link.
  7b. Post to [Your Chat App] #[your_initials]_daily_prep: Parent message with Frame link and audio file. Reply thread with full briefing content.
  7c. Log to #[your_initials]_agent_logs: Run summary with step completion status and any failures.

  SKILLS REQUIRED:
  - [Your Name]OS_Backend (always)
  - Download Profile Photo or Logo to Conversation (always)
  - LinkedIn Insights (always)
  - Meeting Prep (always)
  - Go Deep (always)
